name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # Build the static site. base_path from configure-pages is e.g.
      # "/come-home-love-lb"; Nuxt's NUXT_APP_BASE_URL needs a trailing slash.
      - name: Build
        run: pnpm run build
        env:
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
